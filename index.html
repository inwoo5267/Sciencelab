<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>온라인 과학 실험실</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <!-- React + Babel (브라우저에서 JSX 처리) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      margin: 0;
      background: #f8fafc;
    }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    input[type="range"] {
      -webkit-appearance: none;
      height: 8px;
      border-radius: 999px;
      background: #e2e8f0;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: white;
      border: 3px solid currentColor;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    input[type="range"]::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: white;
      border: 3px solid currentColor;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .loading-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
      gap: 12px;
      color: #64748b;
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e2e8f0;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading-screen">
      <div class="loading-spinner"></div>
      <div style="font-weight:700;">실험실을 준비하고 있어요...</div>
    </div>
  </div>

  <script type="text/babel" data-presets="react">
    const { useState } = React;

    /* =========================================================
       아이콘 컴포넌트 (lucide-react 대신 직접 SVG 정의)
       ========================================================= */
    const makeIcon = (paths) => ({ className = "w-6 h-6", style, ...props }) => (
      <svg
        className={className}
        style={style}
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        strokeWidth="2"
        strokeLinecap="round"
        strokeLinejoin="round"
        {...props}
      >
        {paths}
      </svg>
    );

    const Atom = makeIcon(<>
      <circle cx="12" cy="12" r="1"/>
      <path d="M20.2 20.2c2.04-2.03.02-7.36-4.5-11.9-4.54-4.52-9.87-6.54-11.9-4.5-2.04 2.03-.02 7.36 4.5 11.9 4.54 4.52 9.87 6.54 11.9 4.5Z"/>
      <path d="M15.7 15.7c4.52-4.54 6.54-9.87 4.5-11.9-2.03-2.04-7.36-.02-11.9 4.5-4.52 4.54-6.54 9.87-4.5 11.9 2.03 2.04 7.36.02 11.9-4.5Z"/>
    </>);
    const Zap = makeIcon(<path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/>);
    const ToggleLeft = makeIcon(<>
      <rect width="20" height="12" x="2" y="6" rx="6" ry="6"/>
      <circle cx="8" cy="12" r="2"/>
    </>);
    const Activity = makeIcon(<path d="M22 12h-2.48a2 2 0 0 0-1.93 1.46l-2.35 8.36a.5.5 0 0 1-.96 0L9.24 2.18a.5.5 0 0 0-.96 0l-2.35 8.36A2 2 0 0 1 4 12H2"/>);
    const Cpu = makeIcon(<>
      <rect x="4" y="4" width="16" height="16" rx="2"/>
      <rect x="9" y="9" width="6" height="6"/>
      <path d="M15 2v2"/><path d="M15 20v2"/>
      <path d="M2 15h2"/><path d="M2 9h2"/>
      <path d="M20 15h2"/><path d="M20 9h2"/>
      <path d="M9 2v2"/><path d="M9 20v2"/>
    </>);
    const ChevronLeft = makeIcon(<path d="m15 18-6-6 6-6"/>);
    const Lock = makeIcon(<>
      <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </>);
    const Lightbulb = makeIcon(<>
      <path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/>
      <path d="M9 18h6"/>
      <path d="M10 22h4"/>
    </>);
    const Power = makeIcon(<>
      <path d="M12 2v10"/>
      <path d="M18.4 6.6a9 9 0 1 1-12.77.04"/>
    </>);
    const RotateCcw = makeIcon(<>
      <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
      <path d="M3 3v5h5"/>
    </>);
    const Info = makeIcon(<>
      <circle cx="12" cy="12" r="10"/>
      <path d="M12 16v-4"/>
      <path d="M12 8h.01"/>
    </>);
    const Sparkles = makeIcon(<>
      <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/>
      <path d="M20 3v4"/><path d="M22 5h-4"/>
      <path d="M4 17v2"/><path d="M5 18H3"/>
    </>);
    const ArrowRight = makeIcon(<>
      <path d="M5 12h14"/>
      <path d="m12 5 7 7-7 7"/>
    </>);

    /* =========================================================
       메인 앱
       ========================================================= */
    function ScienceLab() {
      const [currentSim, setCurrentSim] = useState(null);
      return (
        <div className="min-h-screen bg-slate-50 text-slate-900">
          {currentSim === "transistor" ? (
            <TransistorSim onBack={() => setCurrentSim(null)} />
          ) : currentSim === "led" ? (
            <LEDSim onBack={() => setCurrentSim(null)} />
          ) : currentSim === "semi" ? (
            <SemiSim onBack={() => setCurrentSim(null)} />
          ) : (
            <LabHome onSelect={setCurrentSim} />
          )}
        </div>
      );
    }

    /* =========================================================
       실험실 홈
       ========================================================= */
    function LabHome({ onSelect }) {
      const sims = [
        { id: "transistor", title: "접합형 트랜지스터", subtitle: "BJT · NPN / PNP",
          desc: "전기를 켜고 끄거나, 작은 신호를 크게 키우는 부품의 원리를 직접 체험해 봅니다.",
          icon: Cpu, color: "blue", ready: true },
        { id: "led", title: "발광 다이오드 (LED)", subtitle: "Light Emitting Diode",
          desc: "전기가 어떻게 빛으로 바뀌는지, 색깔은 왜 다르게 나오는지 직접 실험해 봅니다.",
          icon: Lightbulb, color: "amber", ready: true },
        { id: "semi", title: "반도체와 8대 공정", subtitle: "Semiconductor · 8 Steps",
          desc: "반도체의 원리를 알아보고, 칩이 만들어지는 8단계를 게임으로 체험합니다.",
          icon: Sparkles, color: "violet", ready: true },
        { id: "soon1", title: "다이오드 정류 회로", subtitle: "Diode · Rectifier",
          desc: "교류를 직류로 바꾸는 정류 작용을 살펴봅니다.",
          icon: Zap, color: "rose", ready: false },
        { id: "soon2", title: "RC 시정수 회로", subtitle: "RC · Time Constant",
          desc: "축전기의 충전과 방전 곡선을 관찰합니다.",
          icon: Activity, color: "emerald", ready: false },
        { id: "soon3", title: "전자기 유도", subtitle: "Faraday's Law",
          desc: "자석과 코일로 전기가 만들어지는 과정을 살펴봅니다.",
          icon: Atom, color: "sky", ready: false },
      ];

      return (
        <div className="min-h-screen">
          <header className="bg-white border-b-2 border-slate-200 sticky top-0 z-10">
            <div className="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-11 h-11 rounded-xl bg-blue-600 flex items-center justify-center shadow-md">
                  <Atom className="w-6 h-6 text-white" />
                </div>
                <div>
                  <div className="font-mono text-[11px] tracking-widest text-blue-600 font-bold">SCIENCE LAB</div>
                  <div className="text-xl font-extrabold tracking-tight">온라인 과학 실험실</div>
                </div>
              </div>
              <div className="hidden sm:flex items-center gap-2 font-mono text-xs text-slate-600">
                <span className="w-2 h-2 rounded-full bg-green-500" />
                <span className="font-bold">실험실 운영중</span>
              </div>
            </div>
          </header>

          <section className="max-w-6xl mx-auto px-6 pt-16 pb-10">
            <div className="inline-flex items-center gap-2 bg-blue-100 text-blue-800 px-3 py-1.5 rounded-full text-xs font-bold mb-5">
              <Sparkles className="w-3.5 h-3.5" />
              중·고등학생을 위한 인터랙티브 과학 실험
            </div>
            <h1 className="text-4xl md:text-5xl font-black leading-tight mb-5 text-slate-900">
              교과서 속 원리,<br />
              <span className="text-blue-600">손끝에서 살아 움직이게.</span>
            </h1>
            <p className="text-slate-700 max-w-2xl leading-relaxed text-lg">
              슬라이더 하나, 스위치 하나로 전류가 흐르고 전구가 켜집니다.
              직접 만져보고 변화를 관찰하면, 어려운 개념도 자연스럽게 이해할 수 있어요.
            </p>
          </section>

          <section className="max-w-6xl mx-auto px-6 py-8 pb-24">
            <div className="flex items-baseline justify-between mb-6">
              <h2 className="text-2xl font-extrabold text-slate-900">시뮬레이션 목록</h2>
              <span className="font-mono text-xs text-slate-500">준비된 실험 3 / 6</span>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
              {sims.map((sim, i) => (
                <SimCard key={sim.id} sim={sim} index={i} onSelect={onSelect} />
              ))}
            </div>
          </section>

          <footer className="border-t border-slate-200 bg-white py-8">
            <div className="max-w-6xl mx-auto px-6 font-mono text-xs text-slate-500 flex justify-between flex-wrap gap-2">
              <span>SCIENCE LAB · INTERACTIVE LEARNING</span>
              <span>EDUCATIONAL · OPEN ACCESS</span>
            </div>
          </footer>
        </div>
      );
    }

    function SimCard({ sim, index, onSelect }) {
      const Icon = sim.icon;
      const colorMap = {
        blue: { bg: "bg-blue-600", text: "text-blue-600" },
        amber: { bg: "bg-amber-500", text: "text-amber-600" },
        violet: { bg: "bg-violet-600", text: "text-violet-600" },
        rose: { bg: "bg-rose-600", text: "text-rose-600" },
        emerald: { bg: "bg-emerald-600", text: "text-emerald-600" },
        sky: { bg: "bg-sky-600", text: "text-sky-600" },
      };
      const c = colorMap[sim.color];

      return (
        <button
          disabled={!sim.ready}
          onClick={() => sim.ready && onSelect(sim.id)}
          className={`group relative text-left p-6 rounded-2xl border-2 transition-all duration-200 overflow-hidden bg-white
            ${sim.ready ? "border-slate-200 hover:border-blue-500 hover:shadow-xl cursor-pointer" : "border-slate-200 opacity-60 cursor-not-allowed"}`}
        >
          <div className="absolute top-5 right-5 font-mono text-xs text-slate-400 font-bold">
            #{String(index + 1).padStart(2, "0")}
          </div>

          <div className="flex items-start gap-4">
            <div className={`flex-shrink-0 w-14 h-14 rounded-xl flex items-center justify-center shadow-md ${sim.ready ? c.bg : "bg-slate-300"}`}>
              {sim.ready ? <Icon className="w-7 h-7 text-white" /> : <Lock className="w-6 h-6 text-white" />}
            </div>
            <div className="flex-1">
              <div className={`font-mono text-[11px] tracking-widest font-bold mb-1 ${c.text}`}>{sim.subtitle}</div>
              <div className="text-xl font-extrabold mb-2 text-slate-900">{sim.title}</div>
              <div className="text-sm text-slate-600 leading-relaxed">{sim.desc}</div>
            </div>
          </div>

          {sim.ready ? (
            <div className="mt-5 pt-4 border-t border-slate-200 flex items-center justify-between text-sm font-bold">
              <span className={c.text}>실험 시작하기</span>
              <ArrowRight className={`w-4 h-4 ${c.text} group-hover:translate-x-1 transition-transform`} />
            </div>
          ) : (
            <div className="mt-5 pt-4 border-t border-slate-200 font-mono text-xs text-slate-500 font-bold">
              준비 중 · COMING SOON
            </div>
          )}
        </button>
      );
    }

    /* =========================================================
       트랜지스터 시뮬레이션
       ========================================================= */
    function TransistorSim({ onBack }) {
      const [tab, setTab] = useState("concept");
      const [type, setType] = useState("NPN");

      const tabs = [
        { id: "concept", label: "트랜지스터란?", num: "1", icon: Info },
        { id: "switch", label: "스위치 작용", num: "2", icon: ToggleLeft },
        { id: "amplify", label: "증폭 작용", num: "3", icon: Activity },
        { id: "breadboard", label: "회로 만들기", num: "4", icon: Cpu },
      ];

      return (
        <div className="min-h-screen">
          <header className="bg-white border-b-2 border-slate-200 sticky top-0 z-10">
            <div className="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between flex-wrap gap-3">
              <button onClick={onBack} className="flex items-center gap-1.5 text-sm text-slate-700 hover:text-blue-600 font-bold transition-colors">
                <ChevronLeft className="w-4 h-4" />
                <span>실험실로 돌아가기</span>
              </button>
              <div className="text-center">
                <div className="font-mono text-[10px] tracking-[0.2em] text-blue-600 font-bold">실험 #01</div>
                <div className="font-extrabold tracking-tight text-slate-900">접합형 트랜지스터</div>
              </div>
              <TypeToggle type={type} setType={setType} />
            </div>

            <div className="max-w-6xl mx-auto px-6">
              <div className="flex gap-1 flex-wrap">
                {tabs.map((t) => {
                  const Icon = t.icon;
                  const active = tab === t.id;
                  return (
                    <button
                      key={t.id}
                      onClick={() => setTab(t.id)}
                      className={`relative px-4 py-3 text-sm font-bold flex items-center gap-2 transition-colors ${active ? "text-blue-600" : "text-slate-500 hover:text-slate-800"}`}
                    >
                      <span className={`w-5 h-5 rounded-full flex items-center justify-center text-[11px] font-mono ${active ? "bg-blue-600 text-white" : "bg-slate-200 text-slate-600"}`}>
                        {t.num}
                      </span>
                      <Icon className="w-4 h-4" />
                      <span>{t.label}</span>
                      {active && <span className="absolute bottom-0 left-0 right-0 h-0.5 bg-blue-600" />}
                    </button>
                  );
                })}
              </div>
            </div>
          </header>

          <div className="max-w-6xl mx-auto px-6 py-8">
            {tab === "concept" && <ConceptTab type={type} />}
            {tab === "switch" && <SwitchTab type={type} />}
            {tab === "amplify" && <AmplifyTab type={type} />}
            {tab === "breadboard" && <BreadboardTab type={type} />}
          </div>
        </div>
      );
    }

    function TypeToggle({ type, setType }) {
      return (
        <div className="inline-flex bg-slate-100 rounded-lg p-1 font-mono text-xs font-bold">
          {[
            { id: "NPN", label: "NPN형", color: "bg-blue-600" },
            { id: "PNP", label: "PNP형", color: "bg-red-600" },
          ].map((t) => (
            <button
              key={t.id}
              onClick={() => setType(t.id)}
              className={`px-4 py-2 rounded transition-all ${type === t.id ? `${t.color} text-white shadow-sm` : "text-slate-600 hover:text-slate-900"}`}
            >
              {t.label}
            </button>
          ))}
        </div>
      );
    }

    /* =========================================================
       탭 1 - 개념
       ========================================================= */
    function ConceptTab({ type }) {
      const isNPN = type === "NPN";
      const accent = isNPN ? "#2563eb" : "#dc2626";
      const accentSoft = isNPN ? "#eff6ff" : "#fef2f2";
      const layers = isNPN ? ["N", "P", "N"] : ["P", "N", "P"];
      const labels = ["이미터(E)", "베이스(B)", "컬렉터(C)"];

      return (
        <div className="space-y-6">
          <Card>
            <CardTitle num="1-1" title="트랜지스터, 어떻게 생겼고 무얼 하는 부품일까?" />
            <div className="grid md:grid-cols-2 gap-6 mt-5">
              <div className="space-y-4 text-slate-800 leading-relaxed">
                <p className="text-lg">
                  트랜지스터는 우리 주변의 <b>거의 모든 전자제품</b> — 스마트폰, 컴퓨터, TV, 라디오, 충전기 — 안에 들어 있는 아주 작은 부품이에요.
                </p>
                <p>하는 일은 단 두 가지로 정리할 수 있어요:</p>
                <div className="space-y-2">
                  <div className="flex items-start gap-3 p-4 bg-blue-50 rounded-xl border-2 border-blue-200">
                    <span className="flex-shrink-0 w-7 h-7 rounded-full bg-blue-600 text-white font-bold flex items-center justify-center text-sm">1</span>
                    <div><b className="text-blue-900">스위치 작용</b><span className="text-slate-700"> — 전류를 켜거나 끄는 일</span></div>
                  </div>
                  <div className="flex items-start gap-3 p-4 bg-amber-50 rounded-xl border-2 border-amber-200">
                    <span className="flex-shrink-0 w-7 h-7 rounded-full bg-amber-600 text-white font-bold flex items-center justify-center text-sm">2</span>
                    <div><b className="text-amber-900">증폭 작용</b><span className="text-slate-700"> — 작은 신호를 큰 신호로 키우는 일</span></div>
                  </div>
                </div>
              </div>

              <div className="bg-slate-100 rounded-xl p-6 border-2 border-slate-200">
                <div className="text-sm font-bold text-slate-600 mb-3">생긴 모양</div>
                <div className="flex justify-center">
                  <RealTransistorImage type={type} />
                </div>
                <div className="text-sm text-slate-700 mt-4 text-center leading-relaxed">
                  검은 반원 모양의 작은 부품, <br />
                  <b>다리가 3개</b> 달려 있어요.
                </div>
              </div>
            </div>
          </Card>

          <div className="grid md:grid-cols-2 gap-6">
            <Card>
              <CardTitle num="1-2" title={`${type}형의 속 구조`} />
              <p className="text-sm text-slate-600 mt-3 mb-5">
                반도체 3장이 <b className="text-slate-900">{type === "NPN" ? "N - P - N" : "P - N - P"}</b> 순서로 붙어 있어요.
                가운데 <b className="text-slate-900">베이스(B)</b>는 아주 얇게 만들어요.
              </p>
              <div className="flex flex-col items-stretch gap-2 mt-4">
                {layers.map((layer, i) => {
                  const isP = layer === "P";
                  return (
                    <div key={i} className="flex items-center gap-3">
                      <div className="font-mono text-xs font-bold text-slate-700 w-24 text-right">{labels[i]}</div>
                      <div
                        className="flex-1 h-16 rounded-lg flex items-center justify-center font-extrabold text-xl border-2"
                        style={{
                          background: isP ? "#fef2f2" : "#eff6ff",
                          borderColor: isP ? "#dc2626" : "#2563eb",
                          color: isP ? "#991b1b" : "#1e3a8a",
                        }}
                      >
                        {layer}형 반도체
                      </div>
                    </div>
                  );
                })}
              </div>
              <div className="mt-5 grid grid-cols-1 gap-2 text-sm">

          {/* 저항 */}
          <g transform="translate(250,80)">

            <line x1="25" y1="0" x2="50" y2="0" stroke={wireColor} strokeWidth="3" />

          {/* LED */}
          <g transform="translate(380,150)">
            {isOn && !burnOut && (
              <>
                <circle cx="0" cy="0" r={30 + brightness * 20} fill={color.hex} opacity={0.3 + brightness * 0.3} />
                <circle cx="0" cy="0" r={50 + brightness * 30} fill={color.hex} opacity={0.1 + brightness * 0.2} />

                  const a = (i * 45) * Math.PI / 180;
                  return <line key={`r${i}`}
                    x1={Math.cos(a) * 22} y1={Math.sin(a) * 22}
                    x2={Math.cos(a) * (40 + brightness * 25)} y2={Math.sin(a) * (40 + brightness * 25)}
                    stroke={color.hex} strokeWidth="2.5" opacity={brightness} />;
                })}
              </>
            )}
            <circle cx="0" cy="0" r="18" fill={burnOut ? "#1e293b" : isOn ? color.hex : "#e5e7eb"}

              <text x="0" y="5" textAnchor="middle" fontSize="18">💥</text>

          </g>

          {/* 아래쪽 배선 (LED → 건전지) */}
          <line x1="380" y1="190" x2="380" y2="210" stroke={wireColor} strokeWidth="3" />
          <line x1="380" y1="210" x2="70" y2="210" stroke={wireColor} strokeWidth="3" />

            <circle key={`fp${i}`} cx="70" cy="80" r="3.5" fill="#eab308">
              <animate attributeName="cx" values="70;200;300;380;380;70;70" dur="3s" repeatCount="indefinite" begin={`${d}s`} />

            </circle>
          ))}
        </svg>
      );

    function DopingViz({ type }) {
      const atoms = [];
      const cols = 5, rows = 4;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          atoms.push({ x: 100 + c * 100, y: 70 + r * 80, r, c });
        }
      }
      const dopantPos = { r: 1, c: 2 }; // 가운데에 불순물

      return (
        <div className="bg-slate-50 rounded-2xl border-2 border-slate-200 p-4">
          <svg viewBox="0 0 600 400" className="w-full" style={{ minHeight: 320 }}>
            {/* 결합선 */}
            {atoms.map((a, i) => {
              const lines = [];
              // 오른쪽
              if (a.c < cols - 1) {
                lines.push(<line key={`bond-r${i}`} x1={a.x + 18} y1={a.y} x2={a.x + 82} y2={a.y} stroke="#94a3b8" strokeWidth="1.5" />);
              }
              // 아래
              if (a.r < rows - 1) {
                lines.push(<line key={`bond-d${i}`} x1={a.x} y1={a.y + 18} x2={a.x} y2={a.y + 62} stroke="#94a3b8" strokeWidth="1.5" />);
              }
              return <g key={`b${i}`}>{lines}</g>;
            })}

            {/* 원자들 */}
            {atoms.map((a, i) => {
              const isDopant = type !== "pure" && a.r === dopantPos.r && a.c === dopantPos.c;
              const dopantColor = type === "n" ? "#2563eb" : "#dc2626";
              const dopantLabel = type === "n" ? "P" : "B";
              const dopantName = type === "n" ? "인" : "붕소";
              return (
                <g key={`a${i}`}>
                  <circle cx={a.x} cy={a.y} r="18"
                    fill={isDopant ? dopantColor : "#cbd5e1"}
                    stroke={isDopant ? dopantColor : "#64748b"}
                    strokeWidth="2.5" />
                  <text x={a.x} y={a.y + 4} textAnchor="middle" fontSize="11" fontWeight="bold"
                    fill={isDopant ? "white" : "#1e293b"} fontFamily="JetBrains Mono">
                    {isDopant ? dopantLabel : "Si"}
                  </text>
                  {isDopant && (
                    <text x={a.x} y={a.y - 28} textAnchor="middle" fontSize="10" fontWeight="bold" fill={dopantColor}>
                      {dopantName}
                    </text>
                  )}
                </g>
              );
            })}

            {/* N형: 자유 전자 표시 */}
            {type === "n" && (
              <g>
                <circle cx={atoms[1*5+2].x + 32} cy={atoms[1*5+2].y - 30} r="10" fill="#1d4ed8">
                  <animate attributeName="cx" values={`${atoms[1*5+2].x + 32};${atoms[1*5+2].x + 100};${atoms[1*5+2].x + 32}`}
                    dur="3s" repeatCount="indefinite" />
                  <animate attributeName="cy" values={`${atoms[1*5+2].y - 30};${atoms[1*5+2].y - 60};${atoms[1*5+2].y - 30}`}
                    dur="3s" repeatCount="indefinite" />
                </circle>
                <text x={atoms[1*5+2].x + 32} y={atoms[1*5+2].y - 26} textAnchor="middle" fontSize="11"
                  fontWeight="bold" fill="white" pointerEvents="none">
                  <animate attributeName="x" values={`${atoms[1*5+2].x + 32};${atoms[1*5+2].x + 100};${atoms[1*5+2].x + 32}`}
                    dur="3s" repeatCount="indefinite" />
                  <animate attributeName="y" values={`${atoms[1*5+2].y - 26};${atoms[1*5+2].y - 56};${atoms[1*5+2].y - 26}`}
                    dur="3s" repeatCount="indefinite" />
                  −
                </text>
                <text x="500" y="350" fontSize="12" fontWeight="bold" fill="#1d4ed8">
                  ↑ 남는 자유 전자(−)
                </text>
              </g>
            )}

            {/* P형: 정공 표시 */}
            {type === "p" && (
              <g>
                <circle cx={atoms[1*5+2].x + 32} cy={atoms[1*5+2].y - 30} r="10"
                  fill="white" stroke="#dc2626" strokeWidth="2.5" strokeDasharray="3,2">
                  <animate attributeName="cx" values={`${atoms[1*5+2].x + 32};${atoms[1*5+2].x - 30};${atoms[1*5+2].x + 32}`}
                    dur="3s" repeatCount="indefinite" />
                </circle>
                <text x={atoms[1*5+2].x + 32} y={atoms[1*5+2].y - 26} textAnchor="middle" fontSize="11"
                  fontWeight="bold" fill="#dc2626" pointerEvents="none">
                  <animate attributeName="x" values={`${atoms[1*5+2].x + 32};${atoms[1*5+2].x - 30};${atoms[1*5+2].x + 32}`}
                    dur="3s" repeatCount="indefinite" />
                  +
                </text>
                <text x="500" y="350" fontSize="12" fontWeight="bold" fill="#dc2626">
                  ↑ 빈 자리 = 정공(+)
                </text>
              </g>
            )}

            {/* 안내 라벨 */}
            <text x="20" y="380" fontSize="11" fill="#64748b" fontFamily="JetBrains Mono">
              {type === "pure" ? "Si 원자들이 손 4개씩 맞잡아 안정 — 자유 전자 없음"
                : type === "n" ? "5번째 전자가 결합에 못 들어가고 자유롭게 떠돎"
                : "전자 1개가 모자라 빈 자리(정공)가 생김"}
            </text>
          </svg>
        </div>
      );
    }

                {[...Array(8)].map((_, i) => (
                  <g key={i}>
                    <line x1={150 + i * 40} y1="40" x2={150 + i * 40} y2="100" stroke="#a855f7" strokeWidth="2" markerEnd="url(#arrowDown)" />
                    <circle cx={150 + i * 40} cy="55" r="4" fill="#a855f7" />
                  </g>
                ))}
                <defs>
                  <marker id="arrowDown" markerWidth="6" markerHeight="6" refX="3" refY="6" orient="auto">
                    <polygon points="0,0 6,0 3,6" fill="#a855f7" />
                  </marker>
                </defs>
                {/* 웨이퍼 */}
                <rect x="100" y="100" width="400" height="60" fill="#94a3b8" />
                {/* 도핑된 영역 */}
                <rect x="170" y="100" width="60" height="40" fill="#a855f7" opacity="0.5" />
                <rect x="280" y="100" width="60" height="40" fill="#a855f7" opacity="0.5" />
                <rect x="390" y="100" width="60" height="40" fill="#a855f7" opacity="0.5" />
                <text x="200" y="125" textAnchor="middle" fontSize="10" fontWeight="bold" fill="white">N영역</text>
                <text x="310" y="125" textAnchor="middle" fontSize="10" fontWeight="bold" fill="white">N영역</text>
                <text x="420" y="125" textAnchor="middle" fontSize="10" fontWeight="bold" fill="white">N영역</text>
                <text x="300" y="200" textAnchor="middle" fontSize="11" fontWeight="bold" fill="#475569">정해진 위치에 불순물을 박아 N형/P형 영역 만들기</text>
              </g>
            )}

            {stepId === 6 && (
              <g>
                {/* 금속 배선 */}
                <text x="300" y="25" textAnchor="middle" fontSize="14" fontWeight="bold" fill="#475569">🔌 금속 (Al, Cu) 증착 + 패턴</text>
                {/* 웨이퍼 + 도핑 영역 */}
                <rect x="100" y="120" width="400" height="60" fill="#94a3b8" />
                <rect x="150" y="120" width="40" height="30" fill="#a855f7" opacity="0.4" />
                <rect x="280" y="120" width="40" height="30" fill="#a855f7" opacity="0.4" />
                <rect x="410" y="120" width="40" height="30" fill="#a855f7" opacity="0.4" />
                {/* 금속 배선 */}
                <rect x="150" y="100" width="40" height="10" fill="#94a3b8" stroke="#1e293b" strokeWidth="1.5" />
                <rect x="280" y="100" width="40" height="10" fill="#94a3b8" stroke="#1e293b" strokeWidth="1.5" />
                <rect x="410" y="100" width="40" height="10" fill="#94a3b8" stroke="#1e293b" strokeWidth="1.5" />
                <line x1="170" y1="100" x2="300" y2="80" stroke="#1e293b" strokeWidth="3" />
                <line x1="300" y1="80" x2="430" y2="80" stroke="#1e293b" strokeWidth="3" />
                <line x1="430" y1="80" x2="430" y2="100" stroke="#1e293b" strokeWidth="3" />
                <line x1="300" y1="80" x2="300" y2="100" stroke="#1e293b" strokeWidth="3" />
                {/* 비아 표시 */}
                <text x="60" y="105" fontSize="9" fontWeight="bold" fill="#1e293b" fontFamily="JetBrains Mono">금속</text>
                <text x="300" y="200" textAnchor="middle" fontSize="11" fontWeight="bold" fill="#475569">부품끼리 금속선으로 연결해 회로 완성</text>
              </g>
            )}

            {stepId === 7 && (
              <g>
                {/* EDS 검사 - 웨이퍼 위 칩 그리드 */}
                <text x="300" y="25" textAnchor="middle" fontSize="14" fontWeight="bold" fill="#10b981">🔍 칩별 전기 검사</text>
                {/* 웨이퍼 (원형) */}
                <circle cx="280" cy="120" r="80" fill="#cbd5e1" stroke="#475569" strokeWidth="2" />
                {/* 칩 그리드 */}
                {[...Array(8)].map((_, i) => {
                  const r = Math.floor(i / 4) - 0.5;
                  return [...Array(8)].map((_, j) => {
                    const c = j - 3.5;
                    const dist = Math.sqrt(r * r + c * c);
                    if (dist > 4.5) return null;
                    const x = 280 + c * 18;
                    const y = 120 + r * 18;
                    const status = (i + j) % 5 === 0 ? "fail" : "pass";
                    return (
                      <g key={`chip${i}${j}`}>
                        <rect x={x - 8} y={y - 8} width="14" height="14"
                          fill={status === "pass" ? "#10b98140" : "#ef444440"}
                          stroke={status === "pass" ? "#10b981" : "#ef4444"} strokeWidth="1" />
                        <text x={x - 1} y={y + 3} textAnchor="middle" fontSize="8" fontWeight="bold"
                          fill={status === "pass" ? "#10b981" : "#ef4444"}>
                          {status === "pass" ? "✓" : "✗"}
                        </text>
                      </g>
                    );
                  });
                })}
                {/* 탐침 */}
                <line x1="420" y1="50" x2="380" y2="115" stroke="#1e293b" strokeWidth="2" />
                <polygon points="378,115 386,113 384,121" fill="#1e293b" />
                <text x="430" y="55" fontSize="11" fontWeight="bold" fill="#1e293b">탐침</text>
                {/* 범례 */}
                <g transform="translate(440,140)">
                  <rect x="0" y="-8" width="14" height="14" fill="#10b98140" stroke="#10b981" strokeWidth="1" />
                  <text x="20" y="3" fontSize="11" fill="#10b981" fontWeight="bold">양품</text>
                  <rect x="0" y="14" width="14" height="14" fill="#ef444440" stroke="#ef4444" strokeWidth="1" />
                  <text x="20" y="25" fontSize="11" fill="#ef4444" fontWeight="bold">불량</text>
                </g>
                <text x="300" y="210" textAnchor="middle" fontSize="11" fontWeight="bold" fill="#475569">탐침으로 칩 하나하나 전기 검사</text>
              </g>
            )}

            {stepId === 8 && (
              <g>
                {/* 패키징 */}
                <text x="300" y="25" textAnchor="middle" fontSize="14" fontWeight="bold" fill="#1e293b">📦 자르고 포장</text>
                {/* 웨이퍼 (점선 격자) */}
                <g transform="translate(140,120)">
                  <circle cx="0" cy="0" r="55" fill="#cbd5e1" stroke="#475569" strokeWidth="2" />
                  {[...Array(5)].map((_, i) => (
                    <line key={`vl${i}`} x1={-50 + i * 25} y1="-50" x2={-50 + i * 25} y2="50" stroke="#dc2626" strokeWidth="1" strokeDasharray="2,2" />
                  ))}
                  {[...Array(5)].map((_, i) => (
                    <line key={`hl${i}`} x1="-50" y1={-50 + i * 25} x2="50" y2={-50 + i * 25} stroke="#dc2626" strokeWidth="1" strokeDasharray="2,2" />
                  ))}
                  <text x="0" y="80" textAnchor="middle" fontSize="10" fill="#475569">자르기 선</text>
                </g>

                <text x="240" y="125" fontSize="32" fill="#7c3aed">→</text>

                {/* 칩 패키지 */}
                <g transform="translate(360,125)">
                  <rect x="-50" y="-30" width="100" height="60" rx="6" fill="#1e293b" />
                  <rect x="-45" y="-25" width="90" height="50" rx="3" fill="#374151" />
                  <text x="0" y="-2" textAnchor="middle" fontSize="11" fontWeight="bold" fill="#cbd5e1" fontFamily="JetBrains Mono">CHIP</text>
                  <text x="0" y="12" textAnchor="middle" fontSize="9" fill="#94a3b8" fontFamily="JetBrains Mono">2026</text>
                  {/* 다리 */}
                  {[...Array(7)].map((_, i) => (
                    <g key={`pin${i}`}>
                      <rect x={-43 + i * 14} y="30" width="6" height="15" fill="#94a3b8" />
                      <rect x={-43 + i * 14} y="-45" width="6" height="15" fill="#94a3b8" />
                    </g>
                  ))}
                  <text x="0" y="80" textAnchor="middle" fontSize="10" fontWeight="bold" fill="#475569">완성된 IC 칩</text>
                </g>
                <text x="500" y="200" textAnchor="middle" fontSize="11" fontWeight="bold" fill="#475569">완성!</text>
              </g>
            )}
          </svg>
        </div>
      );
    }

    /* ----- 칩 만들기 게임 ----- */
    function SemiGameTab() {
      const [completed, setCompleted] = useState([]); // 완료한 step id들
      const [errors, setErrors] = useState(0);
      const [shake, setShake] = useState(null);
      const [done, setDone] = useState(false);

      // 셔플된 카드 순서 (한번만 셔플)
      const [shuffled, setShuffled] = useState(() =>
        [...PROCESS_STEPS].sort(() => Math.random() - 0.5)
      );

      const currentStepNum = completed.length + 1; // 다음에 클릭해야 할 단계

      const handleClick = (step) => {
        if (completed.includes(step.id) || done) return;
        if (step.id === currentStepNum) {
          const newCompleted = [...completed, step.id];
          setCompleted(newCompleted);
          if (newCompleted.length === 8) setDone(true);
        } else {
          setErrors(errors + 1);
          setShake(step.id);
          setTimeout(() => setShake(null), 600);
        }
      };

      const reset = () => {
        setCompleted([]);
        setErrors(0);
        setDone(false);
        setShuffled([...PROCESS_STEPS].sort(() => Math.random() - 0.5));
      };

      return (
        <div className="space-y-6">
          <div className="bg-violet-50 rounded-2xl p-5 border-2 border-violet-300">
            <div className="font-bold text-violet-800 mb-1 flex items-center gap-2">
              <Sparkles className="w-5 h-5" /> 칩 만들기 게임
            </div>
            <p className="text-slate-800 leading-relaxed">
              아래 8개 카드를 <b>올바른 순서</b>로 클릭해 보세요!
              순서가 맞으면 웨이퍼가 점점 칩으로 변해 가요. 틀리면 흔들리며 알려줄 거예요.
            </p>
          </div>

          {/* 진행 상태 */}
          <div className="grid grid-cols-3 gap-3">
            <div className="bg-white rounded-xl border-2 border-slate-200 p-4 text-center">
              <div className="font-mono text-xs text-slate-500">진행</div>
              <div className="text-2xl font-extrabold text-violet-700">{completed.length} / 8</div>
            </div>
            <div className="bg-white rounded-xl border-2 border-slate-200 p-4 text-center">
              <div className="font-mono text-xs text-slate-500">실수</div>
              <div className="text-2xl font-extrabold text-rose-600">{errors}</div>
            </div>
            <button onClick={reset}
              className="bg-white rounded-xl border-2 border-slate-200 p-4 hover:border-violet-500 transition-colors flex flex-col items-center justify-center">
              <RotateCcw className="w-5 h-5 text-violet-600 mb-1" />
              <div className="text-xs font-bold text-violet-700">다시 섞기</div>
            </button>
          </div>

          {/* 웨이퍼 진화 */}
          <Card>
            <CardTitle num="🎮 진행 상황" title={done ? "🎉 완성! 첫 번째 반도체 칩을 만들었어요!" : `다음 단계: ${PROCESS_STEPS[Math.min(7, currentStepNum - 1)].ko}`} />
            <div className="mt-5">
              <WaferEvolution completed={completed} done={done} />
            </div>
          </Card>

          {/* 카드 그리드 */}
          <Card>
            <CardTitle num="📌 단계 카드" title="올바른 순서로 클릭하세요" />
            <div className="mt-5 grid grid-cols-2 md:grid-cols-4 gap-3">
              {shuffled.map((step) => {
                const isDone = completed.includes(step.id);
                const isShake = shake === step.id;
                const order = isDone ? completed.indexOf(step.id) + 1 : null;
                return (
                  <button key={step.id} onClick={() => handleClick(step)}
                    disabled={isDone || done}
                    className={`relative p-4 rounded-xl border-2 text-left transition-all ${isDone ? "bg-emerald-50 border-emerald-400 opacity-90" : "bg-white border-slate-300 hover:border-violet-500 hover:shadow-md cursor-pointer"} ${isShake ? "animate-shake border-rose-500 bg-rose-50" : ""}`}>
                    {isDone && (
                      <div className="absolute top-2 right-2 w-7 h-7 rounded-full bg-emerald-500 text-white font-bold text-sm flex items-center justify-center">{order}</div>
                    )}
                    <div className="text-3xl mb-2">{step.icon}</div>
                    <div className="font-extrabold text-slate-900">{step.ko}</div>
                    <div className="text-[11px] font-mono text-slate-500 mt-0.5">{step.en.toUpperCase()}</div>
                    <div className="text-xs text-slate-600 mt-2 leading-snug">{step.short}</div>
                  </button>
                );
              })}
            </div>
            <style>{`
              @keyframes shake {
                0%, 100% { transform: translateX(0); }
                20% { transform: translateX(-6px); }
                40% { transform: translateX(6px); }
                60% { transform: translateX(-4px); }
                80% { transform: translateX(4px); }
              }
              .animate-shake { animation: shake 0.5s; }
            `}</style>
          </Card>

          {done && (
            <div className="bg-gradient-to-r from-violet-100 to-amber-100 rounded-2xl p-6 border-2 border-violet-400">
              <div className="text-center">
                <div className="text-5xl mb-2">🎉</div>
                <div className="text-2xl font-extrabold text-violet-900 mb-2">축하합니다!</div>
                <p className="text-slate-800 leading-relaxed">
                  반도체 8대 공정을 모두 정확한 순서로 완수했어요.<br />
                  실수 횟수: <b className="text-rose-600">{errors}회</b>
                </p>
                <button onClick={reset}
                  className="mt-4 px-6 py-2.5 bg-violet-600 text-white rounded-lg font-bold hover:bg-violet-700">
                  다시 도전하기
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    function WaferEvolution({ completed, done }) {
      const stage = completed.length;
      // 단계별 누적 시각화
      return (
        <div className="bg-slate-50 rounded-2xl border-2 border-slate-200 p-4">
          <svg viewBox="0 0 600 240" className="w-full" style={{ minHeight: 200 }}>
            {/* 배경 작업대 */}
            <rect x="0" y="200" width="600" height="40" fill="#e2e8f0" />

            {/* 1: 웨이퍼 등장 */}
            {stage >= 1 && (
              <g transform="translate(300,140)">
                <ellipse cx="0" cy="0" rx="160" ry="35" fill="#cbd5e1" stroke="#475569" strokeWidth="2" />
                <ellipse cx="0" cy="-3" rx="160" ry="32" fill="#e2e8f0" />
              </g>
            )}

            {/* 2: 산화막 */}
            {stage >= 2 && (
              <ellipse cx="300" cy="115" rx="160" ry="10" fill="#3b82f6" opacity="0.6" />
            )}

            {/* 3: 감광액 */}
            {stage >= 3 && (
              <ellipse cx="300" cy="100" rx="158" ry="8" fill="#fbbf24" opacity="0.7" />
            )}

            {/* 4: 식각 후 패턴 */}
            {stage >= 4 && (
              <g>
                {[100, 180, 260, 340, 420].map((x, i) => (
                  <rect key={i} x={x} y="93" width="40" height="22" fill="#3b82f6" opacity="0.7" />
                ))}
              </g>
            )}

            {/* 5: 도핑 영역 */}
            {stage >= 5 && (
              <g>
                {[120, 200, 280, 360, 440].map((x, i) => (
                  <rect key={i} x={x} y="118" width="20" height="18" fill="#a855f7" opacity="0.7" />
                ))}
              </g>
            )}

            {/* 6: 금속 배선 */}
            {stage >= 6 && (
              <g>
                <line x1="140" y1="93" x2="220" y2="80" stroke="#475569" strokeWidth="3" />
                <line x1="220" y1="80" x2="380" y2="80" stroke="#475569" strokeWidth="3" />
                <line x1="380" y1="80" x2="460" y2="93" stroke="#475569" strokeWidth="3" />
                {[140, 220, 300, 380, 460].map((x, i) => (
                  <circle key={i} cx={x} cy="92" r="4" fill="#475569" />
                ))}
              </g>
            )}

            {/* 7: 검사 마크 */}
            {stage >= 7 && (
              <g>
                {[140, 220, 380, 460].map((x, i) => (
                  <text key={i} x={x} y="58" textAnchor="middle" fontSize="14" fontWeight="bold" fill="#10b981">✓</text>
                ))}
                <text x="300" y="58" textAnchor="middle" fontSize="14" fontWeight="bold" fill="#ef4444">✗</text>
              </g>
            )}

            {/* 8: 완성된 칩 패키지 */}
            {stage >= 8 && (
              <g transform="translate(300,140)">
                <rect x="-100" y="-30" width="200" height="60" rx="8" fill="#1e293b" stroke="#0f172a" strokeWidth="2" />
                <text x="0" y="0" textAnchor="middle" fontSize="14" fontWeight="bold" fill="#cbd5e1" fontFamily="JetBrains Mono">FINISHED CHIP</text>
                <text x="0" y="18" textAnchor="middle" fontSize="10" fill="#94a3b8" fontFamily="JetBrains Mono">© Science Lab</text>
                {[...Array(8)].map((_, i) => (
                  <g key={i}>
                    <rect x={-90 + i * 24} y="30" width="6" height="15" fill="#94a3b8" />
                    <rect x={-90 + i * 24} y="-45" width="6" height="15" fill="#94a3b8" />
                  </g>
                ))}
              </g>
            )}

            {/* 진행 단계 라벨 */}
            <text x="20" y="30" fontSize="13" fontWeight="bold" fill="#7c3aed" fontFamily="JetBrains Mono">
              {stage}/8 단계 완료
            </text>
            {stage > 0 && stage < 8 && (
              <text x="20" y="50" fontSize="11" fill="#64748b">
                다음: {PROCESS_STEPS[stage].ko}
              </text>
            )}
            {stage === 0 && (
              <text x="300" y="140" textAnchor="middle" fontSize="14" fill="#94a3b8" fontWeight="bold">
                첫 번째 단계를 선택해 시작하세요
              </text>
            )}
            {done && (
              <text x="300" y="220" textAnchor="middle" fontSize="14" fontWeight="bold" fill="#7c3aed">
                ✨ 칩 완성! ✨
              </text>
            )}
          </svg>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ScienceLab />);
  </script>
</body>
</html>
